<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Информация о специалисте</title>

<link rel="stylesheet" href="css/master.css" />
</head>

<body>

<header class="header">
  <a href="index.html" class="nav-link">🏠 Главная</a>
  <a href="viewData.html" class="nav-link">⬅ К списку специалистов</a>
</header>

<main class="container">

<h1>Информация о специалисте</h1>

<div id="master-info" class="card">
  <p><strong>Имя:</strong> <span id="name"></span></p>
  <p><strong>Профессия:</strong> <span id="profession_id"></span></p>
  <p><strong>Зарплата:</strong> <span id="profession_price"></span></p>
</div>

<h2>Портфолио</h2>
<div id="portfolio" class="portfolio-grid"></div>

</main>

<!-- Модальное окно -->
<div id="image-modal">
  <img src="" alt="Просмотр изображения" />
</div>

<script>
const params = new URLSearchParams(window.location.search);

const name = params.get('name') || 'Неизвестно';
const profession_title = params.get('profession_id') || 'Неизвестно';
const profession_price = params.get('profession_price') || 'Неизвестно';
const portfolio = params.get('portfolio') || '';

// вывод данных
document.getElementById('name').textContent = decodeURIComponent(name);
document.getElementById('profession_id').textContent = decodeURIComponent(profession_title);
document.getElementById('profession_price').textContent = decodeURIComponent(profession_price) + '$';

// вставка портфолио
document.getElementById('portfolio').innerHTML = portfolio;

// modal
const modal = document.getElementById('image-modal');
const modalImg = modal.querySelector('img');

document.getElementById('portfolio').addEventListener('click', function(e) {
  if (e.target.tagName.toLowerCase() === 'img') {
    modalImg.src = e.target.src;
    modal.classList.add('show');
  }
});

modal.addEventListener('click', () => {
  modal.classList.remove('show');
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    modal.classList.remove('show');
  }
});
</script>

</body>
</html>

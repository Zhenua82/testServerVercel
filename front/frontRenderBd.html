<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Данные из БД</title>
<link rel="stylesheet" href="css/cssForm.css">
</head>
<body>
  <h1>Работа с сервером render.com</h1>

<div>
  <button onclick="handleUpdate()">Запрос в бд</button>
</div>

<form id="myForm" enctype="multipart/form-data">
  <label for="name">Name (макс 9 символов):</label><br>
  <input type="text" id="name" name="Name" maxlength="9" required><br><br>
  <label for="photo">Photo (визитка):</label><br>
  <input type="file" id="photo" name="photo" accept="image/*" required><br><br>
  <label for="portfolio">Portfolio (несколько изображений):</label><br>
  <input type="file" id="portfolio" name="portfolio" accept="image/*" multiple><br><br>
  <label for="speciality">Speciality:</label><br>
  <input type="text" id="speciality" name="speciality" maxlength="27"><br><br>
  <label for="profession_id">Profession ID:</label><br>
  <select id="profession_id" name="profession_id" required>
    <option value="">Выберите профессию</option>
    <option value="5">5</option>
    <option value="6">6</option>
    <option value="9">9</option>
  </select><br><br>
  <label for="telephone">Telephone:</label><br>
  <input type="text" id="telephone" name="telephone" maxlength="81"><br><br>

  <button type="submit">Отправить</button>
</form>

<div id="result"></div>

<script>
  // прогреваем Render при первой загрузке страницы
fetch('https://testserverrender.onrender.com/');

const handleUpdate = async () => {
  try {
    const response = await fetch('https://testserverrender.onrender.com/bd', { method: 'POST' });
    if (!response.ok) {
      const errText = await response.text();
      alert('Ошибка при запросе к серверу: ' + errText);
      return;
    }
    const data = await response.json();
    localStorage.setItem('personData', JSON.stringify(data.result));
    // window.open('viewData.html', '_blank');
    window.open('/front/viewData.html', '_blank');
    window.open('https://testserver-eight-olive.vercel.app/front/viewData.html', '_blank');
  } catch (error) {
    console.error('Ошибка:', error);
    alert('Произошла ошибка при выполнении запроса: ' + error.message);
  }
};

let isServerReady = false;
// Прогреваем Render сервер
const warmUpServer = async () => {
  try {
    const res = await fetch('https://testserverrender.onrender.com/api/ping');
    console.log('🔥 Сервер готов:', await res.text());
    isServerReady = true;
  } catch (err) {
    console.warn('Сервер пока не отвечает:', err);
  }
};

warmUpServer();

document.getElementById('myForm').addEventListener('submit', async function (event) {
  event.preventDefault();

  if (!isServerReady) {
    alert('Подождите, сервер ещё запускается. Попробуйте через пару секунд...');
    return;
  }

  const form = event.target;
  const formData = new FormData(form);

  try {
    const response = await fetch('https://testserverrender.onrender.com/bdPost', {
      method: 'POST',
      body: formData
    });

    const result = await response.json();

    if (response.ok && result.success) {
      console.log("✅ Форма успешно отправлена!", result);
      handleUpdate();
      form.reset();
    } else {
      console.error("❌ Ошибка при отправке формы:", result);
      alert('Ошибка при отправке: ' + (result?.error || 'Неизвестная'));
    }
  } catch (error) {
    console.error("❌ Ошибка при запросе:", error);
    alert('Сетевая ошибка: ' + error.message);
  }
});
</script>

</body>
</html>

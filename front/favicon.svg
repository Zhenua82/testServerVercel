<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e7d32"></stop>
      <stop offset="100%" stop-color="#00acc1"></stop>
    </linearGradient>
  </defs>

  <!-- фон -->
  <rect width="64" height="64" rx="12" fill="url(#grad)"></rect>

  <!-- буква N -->
  <text x="50%" y="55%" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="white" font-weight="bold">
    N
  </text>

  <!-- точки сети -->
  <circle cx="12" cy="12" r="3" fill="#ff5252"></circle>
  <circle cx="52" cy="12" r="3" fill="#ffffff"></circle>
  <circle cx="52" cy="52" r="3" fill="#ff5252"></circle>

  <!-- линии -->
  <line x1="12" y1="12" x2="52" y2="12" stroke="white" stroke-width="1"></line>
  <line x1="52" y1="12" x2="52" y2="52" stroke="white" stroke-width="1"></line>
</svg>